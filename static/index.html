<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .month-header { background-color: #e0e0e0; font-weight: bold; }
        .total-row { font-weight: bold; background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Monthly Transactions Summary</h1>
    <table id="summaryTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be added here by JS -->
        </tbody>
    </table>

    <script>
        fetch('http://localhost:8080/monthly-summary')
            .then(response => response.json())
            .then(data => {
                const tableBody = document.querySelector('#summaryTable tbody');
                data.forEach(month => {
                    // Add month header row
                    const headerRow = document.createElement('tr');
                    headerRow.classList.add('month-header');
                    headerRow.innerHTML = `<td colspan="5">${month.month} (Total: $${month.total.toFixed(2)})</td>`;
                    tableBody.appendChild(headerRow);

                    // Add transaction rows
                    month.transactions.forEach(tx => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${tx.id}</td>
                            <td>$${tx.amount.toFixed(2)}</td>
                            <td>${tx.category}</td>
                            <td>${new Date(tx.date).toLocaleString()}</td>
                            <td>${tx.description}</td>
                        `;
                        tableBody.appendChild(row);
                    });

                    // Add total row (optional, since header has it)
                    const totalRow = document.createElement('tr');
                    totalRow.classList.add('total-row');
                    totalRow.innerHTML = `<td colspan="4">Total</td><td>$${month.total.toFixed(2)}</td>`;
                    tableBody.appendChild(totalRow);
                });
            })
            .catch(error => console.error('Error:', error));
    </script>
</body>
</html>
